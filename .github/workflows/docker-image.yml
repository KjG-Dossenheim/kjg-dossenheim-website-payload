name: Docker Image CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Make envfile
      uses: SpicyPizza/create-envfile@v2.0
      with:
        envkey_DATABASE_URI: ${{ secrets.DATABASE_URI }}
        envkey_PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
        envkey_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
        envkey_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        envkey_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        envkey_S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        file_name: .env
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)